<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRANAV.EXE</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #A8A6A4;
    --text: #ffffff;
    --muted: rgba(255,255,255,0.45);
    --pill: rgba(255,255,255,0.08);
    --pill-border: rgba(255,255,255,0.35);
    --pill-hover: rgba(255,255,255,0.18);
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
    color: var(--text);
  }

  /* ── Canvas ── */
  #canvas {
    position: fixed; inset: 0; z-index: 0;
    cursor: crosshair;
  }
  #canvas.dragging { cursor: grabbing; }
  #canvas.over-head { cursor: crosshair; }

  /* Top-right white gradient overlay */
  #bg-gradient {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
    background: radial-gradient(ellipse at top right, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0) 60%);
  }

  /* ── Interface ── */
  #brand {
    position: fixed; left: 32px; top: 32px; z-index: 10;
    font-size: 14px; font-weight: 700; letter-spacing: 0.15em;
    user-select: none;
  }
  #sticker-count {
    position: fixed; left: 32px; bottom: 32px; z-index: 10;
    font-size: 13px; font-weight: 400; color: var(--muted);
    user-select: none;
  }
  
  #prompt-list {
    position: fixed; left: 32px; bottom: 84px; z-index: 20;
    display: flex; flex-direction: column; gap: 8px;
    align-items: flex-start;
  }
  .prompt-btn {
    padding: 10px 18px;
    background: var(--pill);
    border: 1px solid var(--pill-border);
    border-radius: 999px;
    font-family: inherit; font-size: 13px; font-weight: 400;
    color: var(--text); cursor: pointer;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    transition: background 0.15s, transform 0.15s;
    user-select: none; white-space: nowrap;
  }
  .prompt-btn:hover {
    background: var(--pill-hover);
    transform: translateY(-1px);
  }
  .prompt-btn:active { transform: translateY(1px); }

  /* ── Chat Input ── */
  #chat-input-container {
    position: fixed; left: 32px; bottom: 32px; z-index: 20;
    width: 440px;
  }
  #chat-input {
    width: 100%;
    padding: 14px 20px;
    background: var(--pill);
    border: 1px solid var(--pill-border);
    border-radius: 999px;
    font-family: inherit; font-size: 13px; font-weight: 400;
    color: var(--text);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    outline: none;
    transition: background 0.15s, border-color 0.15s;
  }
  #chat-input::placeholder { color: rgba(255,255,255,0.45); }
  #chat-input:focus { background: var(--pill-hover); border-color: rgba(255,255,255,0.5); }
  
  .dragging-item { opacity: 0.3; transform: scale(0.95); pointer-events: none; }
  /* ── Drag ghost ── */
  #drag-ghost {
    position: fixed; z-index: 999; pointer-events: none;
    width: 90px; height: 90px;
    transform: translate(-50%, -50%) rotate(-8deg) scale(1.05);
    transition: transform 0.1s;
    display: none;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.22));
  }
  #drag-ghost img { width: 100%; height: 100%; object-fit: contain; }

  /* ── Drop hint ── */
  #drop-hint {
    position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%);
    z-index: 20; pointer-events: none;
    font-size: 11.5px; font-weight: 300; letter-spacing: 0.12em;
    color: var(--muted);
    opacity: 0; transition: opacity 0.4s;
  }
  #drop-hint.visible { opacity: 1; }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed; z-index: 30; pointer-events: none;
    background: rgba(20,20,18,0.82);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: rgba(255,255,255,0.9);
    font-size: 10.5px; letter-spacing: 0.06em;
    padding: 5px 10px; border-radius: 6px;
    opacity: 0; transition: opacity 0.18s;
    white-space: nowrap;
  }
  #tooltip.visible { opacity: 1; }

  /* ── Peel cursor ring ── */
  #cursor-ring {
    position: fixed; z-index: 25; pointer-events: none;
    width: 48px; height: 48px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.5);
    transform: translate(-50%, -50%);
    opacity: 0; transition: opacity 0.2s, width 0.2s, height 0.2s;
  }
  #cursor-ring.visible { opacity: 1; }
  #cursor-ring.active { width: 60px; height: 60px; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="bg-gradient"></div>

<!-- Loading screen -->
<div id="loading">
  <div class="loader-ring"></div>
  <div id="loading-text">Loading model…</div>
</div>

<div id="brand">PRANAV.EXE</div>
<div id="sticker-count">0 stickers placed</div>

<!-- Conversation interface -->
<div id="prompt-list"></div>

<div id="chat-input-container">
  <input type="text" id="chat-input" placeholder="Ask me a question that you want to know about...">
</div>

<!-- Drag ghost -->
<div id="drag-ghost"><img id="ghost-img" src="" alt=""></div>

<!-- Drop hint -->
<div id="drop-hint">Drop on the head to place sticker</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Cursor ring -->
<div id="cursor-ring"></div>

<!-- Three.js + GLTFLoader from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/DecalGeometry.js"></script>

<!-- Sticker data + app -->
<script src="js/stickers.js"></script>
<script src="js/app.js"></script>

</body>
</html>
